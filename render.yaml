services:
  - type: web
    name: ella-flower-shop
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: bash start.sh
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ella-flower-db
          property: connectionString
      - key: DJANGO_ADMIN_USERNAME
        sync: false
      - key: DJANGO_ADMIN_PASSWORD
        sync: false
      - key: DJANGO_ADMIN_EMAIL
        sync: false
      - key: DJANGO_WORKER_USERNAME
        sync: false
      - key: DJANGO_WORKER_PASSWORD
        sync: false
      - key: DJANGO_WORKER_EMAIL
        sync: false

databases:
  - name: ella-flower-db
    databaseName: ella
    user: ella
